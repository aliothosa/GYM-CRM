spring.application.name=GYM-CRM

# PostgreSQL (start with: scripts/run-postgres.sh)
spring.datasource.url=jdbc:postgresql://localhost:5432/gymcrm
spring.datasource.username=gymcrm_user
spring.datasource.password=gymcrm_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# Learning/dev: recreate schema on every run, then load data.sql for a fixed seed dataset.
# Tables are dropped again when the application shuts down.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Always apply data.sql after Hibernate creates an empty schema.
spring.sql.init.mode=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.elioth.epam.gymcrm.service=INFO
logging.level.com.elioth.epam.gymcrm.repository=DEBUG
